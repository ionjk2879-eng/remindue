spring:
  application:
    name: remindue

  # 로컬 개발: H2 인메모리 DB (Phase 4에서 PostgreSQL로 전환)
  datasource:
    url: jdbc:h2:mem:remindue;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

jwt:
  secret: "change-this-secret-key-before-production-32bytes-minimum"
  access-token-expiration-ms: 3600000      # 1시간
  refresh-token-expiration-ms: 1209600000  # 14일
